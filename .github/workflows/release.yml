name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Release-plz PR
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  prepare-release:
    name: Prepare release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install release-plz
        run: cargo install release-plz --locked

      - name: Run release-plz release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        shell: bash
        run: |
          release_output="$(release-plz release --git-token "$GITHUB_TOKEN" -o json)"
          echo "$release_output"
          tag="$(echo "$release_output" | jq -r '.releases[0].tag // empty')"
          if [ -z "$tag" ]; then
            echo "No release was created by release-plz"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    if: github.event_name == 'workflow_dispatch'
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            bin_name: snake
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            bin_name: snake
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            bin_name: snake.exe
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive_ext: zip
            bin_name: snake.exe
          - runner: macos-15
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            bin_name: snake
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            bin_name: snake

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Build release binary
        shell: bash
        run: cargo build --release --target "${{ matrix.target }}"

      - name: Package release archive on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          asset_name="snake-${RELEASE_TAG}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf "dist/${asset_name}" "${{ matrix.bin_name }}"

      - name: Package release archive on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          $assetName = "snake-$env:RELEASE_TAG-${{ matrix.target }}.${{ matrix.archive_ext }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" -DestinationPath "dist/$assetName"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    needs:
      - prepare-release
      - build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        shell: bash
        run: |
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || \
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          gh release upload "${RELEASE_TAG}" dist/* --clobber
